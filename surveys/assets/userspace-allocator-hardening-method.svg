<svg viewBox="0 0 820 648" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'PingFang SC','Microsoft YaHei',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="648" fill="#ffffff"/>
  <text x="410" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">方案图：BackupRefPtr 释放-隔离生命周期</text>
  <text x="410" y="54" text-anchor="middle" font-size="12" fill="#64748b">MiraclePtr 落地算法 · 编号对应正文五步 · * = 相对经典分配器的新增动作</text>

  <!-- 1 alloc slot -->
  <circle cx="184" cy="106" r="13" fill="#0f172a"/><text x="184" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <rect x="210" y="80" width="400" height="58" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <rect x="218" y="88" width="116" height="42" rx="6" fill="#fff7ed" stroke="#ea580c"/>
  <text x="276" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">refcnt +4B</text>
  <text x="276" y="122" text-anchor="middle" font-size="11" fill="#9a3412">(初始 0)</text>
  <text x="475" y="105" text-anchor="middle" font-size="13" fill="#1e293b">user data</text>
  <text x="475" y="123" text-anchor="middle" font-size="11" fill="#64748b">→ 返回给 app</text>
  <text x="350" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">① 分配（PartitionAlloc 槽）</text>
  <line x1="410" y1="138" x2="410" y2="162" stroke="#475569" marker-end="url(#arr)"/>

  <!-- 2 reference -->
  <circle cx="184" cy="187" r="13" fill="#0f172a"/><text x="184" y="191" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <rect x="210" y="164" width="400" height="48" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="410" y="184" text-anchor="middle" font-size="12.5" fill="#1e293b">② 引用：raw_ptr&lt;T&gt; 构造/拷贝 atomic++，析构 atomic--</text>
  <text x="410" y="201" text-anchor="middle" font-size="11" fill="#64748b">解引用 / 取指针零开销；只有初始化·析构·赋值有成本</text>
  <line x1="410" y1="212" x2="410" y2="236" stroke="#475569" marker-end="url(#arr)"/>

  <!-- 3 free decision -->
  <circle cx="226" cy="261" r="13" fill="#0f172a"/><text x="226" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <rect x="252" y="238" width="316" height="46" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="410" y="266" text-anchor="middle" font-size="13" fill="#1e293b">③ owning ptr → free()：检查 refcnt</text>
  <!-- branches -->
  <path d="M352,284 L196,318" stroke="#475569" fill="none" marker-end="url(#arr)"/>
  <text x="250" y="304" text-anchor="middle" font-size="11" fill="#475569">refcnt = 0</text>
  <path d="M470,284 L612,318" stroke="#ea580c" fill="none" marker-end="url(#arr)"/>
  <text x="566" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">refcnt &gt; 0</text>

  <!-- left branch normal -->
  <rect x="60" y="320" width="270" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="195" y="343" text-anchor="middle" font-size="12.5" fill="#334155">归还 freelist（与经典分配器相同）</text>
  <text x="195" y="361" text-anchor="middle" font-size="11" fill="#64748b">无悬垂引用，立即可复用</text>

  <!-- right branch hardened -->
  <rect x="458" y="320" width="304" height="66" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="610" y="343" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9a3412">* 隔离 quarantine + * 投毒</text>
  <text x="610" y="361" text-anchor="middle" font-size="12.5" fill="#9a3412">user data := 0xEF..EF</text>
  <text x="610" y="378" text-anchor="middle" font-size="11" fill="#b45309">不归还 freelist，直到 refcnt 归零</text>
  <line x1="610" y1="386" x2="610" y2="412" stroke="#dc2626" marker-end="url(#arrR)"/>

  <!-- 4 dangling deref -->
  <circle cx="434" cy="445" r="13" fill="#dc2626"/><text x="434" y="449" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <rect x="458" y="414" width="304" height="62" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="610" y="438" text-anchor="middle" font-size="12.5" fill="#991b1b">④ dangling raw_ptr 读到 0xEF..EF</text>
  <text x="610" y="456" text-anchor="middle" font-size="12.5" fill="#991b1b">→ 当指针 / 长度再用即 crash</text>
  <text x="610" y="471" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">利用失败，而非得手</text>
  <line x1="610" y1="476" x2="610" y2="504" stroke="#475569" marker-end="url(#arr)"/>
  <text x="700" y="494" text-anchor="middle" font-size="10.5" fill="#64748b">所有 raw_ptr 析构</text>

  <!-- 5 real release -->
  <circle cx="434" cy="535" r="13" fill="#059669"/><text x="434" y="539" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">5</text>
  <rect x="458" y="506" width="304" height="56" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="610" y="529" text-anchor="middle" font-size="12.5" fill="#065f46">⑤ 末个 raw_ptr 析构，refcnt = 0</text>
  <text x="610" y="547" text-anchor="middle" font-size="11.5" fill="#047857">→ 内存真正回收，可被复用</text>

  <!-- legend -->
  <rect x="60" y="598" width="700" height="34" rx="6" fill="#fcfcfd" stroke="#e2e8f0"/>
  <rect x="78" y="609" width="16" height="12" rx="2" fill="#fff7ed" stroke="#ea580c"/>
  <text x="100" y="619" font-size="11.5" fill="#475569">* BRP 新增动作（引用计数 / 隔离 / 投毒）</text>
  <rect x="356" y="609" width="16" height="12" rx="2" fill="#fef2f2" stroke="#dc2626"/>
  <text x="378" y="619" font-size="11.5" fill="#475569">攻击者利用路径被挡</text>
  <rect x="566" y="609" width="16" height="12" rx="2" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="588" y="619" font-size="11.5" fill="#475569">与经典分配器相同的路径</text>
</svg>

<svg width="100%" viewBox="0 0 680 428" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid meet">
<title>端侧 KV-Cache 页式 LRU 架构图</title>
<desc>页粒度冷热信号来自注意力命中，置 access bit/推进代次；active 链为热 KV、inactive 链为冷 KV；aging 清位后 active 尾页 demote 到 inactive，inactive 命中或 refault 则 promote 回 active；从 inactive 尾经守卫（refcnt>0 或共享前缀跳过）后做升级式分级淘汰：量化 2-bit → offload UFS → drop。</desc>
<style>
.t{font:14px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;fill:#1f2937}
.ts{font:12px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;fill:#6b7280}
.tl{font:600 12px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;fill:#6b7280}
.th{font:600 15px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;fill:#111827}
</style>
<defs>
<marker id="le" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/></marker>
</defs>
<rect x="0" y="0" width="680" height="428" fill="#ffffff"/>
<text class="th" x="24" y="22">端侧 KV-Cache 页式 LRU 架构：双链 + 页粒度冷热 + 分级淘汰</text>
<text class="ts" x="24" y="42">把 OS 双链 LRU（A05）搬到 KV 页：冷热信号 = 注意力是否命中；淘汰 = 分级（量化 → offload → drop）</text>

<rect x="110" y="54" width="460" height="42" rx="8" fill="none" stroke="#9ca3af"/>
<text class="t" x="340" y="73" text-anchor="middle">① 页粒度冷热信号（注意力命中）</text>
<text class="ts" x="340" y="89" text-anchor="middle">本步命中的 KV 块 → 置 access bit / 推进代次（MGLRU aging）</text>
<line x1="340" y1="96" x2="340" y2="110" stroke="#6b7280" marker-end="url(#le)"/>

<rect x="40" y="110" width="600" height="62" rx="8" fill="#d97706" fill-opacity="0.06" stroke="#d97706"/>
<text class="t" x="52" y="128">active 链 · 热（近期被注意力高频命中）</text>
<rect x="56" y="138" width="64" height="24" rx="4" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
<rect x="128" y="138" width="64" height="24" rx="4" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
<rect x="200" y="138" width="64" height="24" rx="4" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
<rect x="272" y="138" width="64" height="24" rx="4" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
<rect x="344" y="138" width="64" height="24" rx="4" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
<text class="ts" x="424" y="154">每页：gen · cnt · refcnt</text>

<line x1="500" y1="172" x2="500" y2="212" stroke="#6b7280" marker-end="url(#le)"/>
<text class="ts" x="508" y="196">demote</text>
<line x1="180" y1="212" x2="180" y2="172" stroke="#6b7280" marker-end="url(#le)"/>
<text class="ts" x="60" y="196">promote（refault）</text>

<rect x="40" y="212" width="600" height="62" rx="8" fill="#2563eb" fill-opacity="0.06" stroke="#2563eb"/>
<text class="t" x="52" y="230">inactive 链 · 冷（回收候选，尾部先淘汰）</text>
<rect x="56" y="240" width="64" height="24" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb"/>
<rect x="128" y="240" width="64" height="24" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb"/>
<rect x="200" y="240" width="64" height="24" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb"/>
<rect x="272" y="240" width="64" height="24" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb"/>
<rect x="344" y="240" width="64" height="24" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb"/>
<text class="ts" x="424" y="256">tail → 先淘汰</text>
<line x1="340" y1="274" x2="340" y2="288" stroke="#6b7280" marker-end="url(#le)"/>

<rect x="190" y="288" width="300" height="34" rx="8" fill="none" stroke="#6b7280" stroke-dasharray="5 4"/>
<text class="t" x="340" y="309" text-anchor="middle">淘汰守卫：refcnt&gt;0 或属共享前缀？→ 跳过保护</text>
<line x1="340" y1="322" x2="340" y2="334" stroke="#6b7280" marker-end="url(#le)"/>

<rect x="56" y="334" width="172" height="44" rx="8" fill="#2563eb" fill-opacity="0.06" stroke="#2563eb"/>
<text class="t" x="142" y="354" text-anchor="middle">② 量化 2-bit</text>
<text class="ts" x="142" y="370" text-anchor="middle">KIVI · 降精度换容量</text>
<line x1="228" y1="356" x2="252" y2="356" stroke="#6b7280" marker-end="url(#le)"/>
<rect x="254" y="334" width="172" height="44" rx="8" fill="#2563eb" fill-opacity="0.06" stroke="#2563eb"/>
<text class="t" x="340" y="354" text-anchor="middle">③ offload UFS</text>
<text class="ts" x="340" y="370" text-anchor="middle">KVSwap 预测预取 · pSLC</text>
<line x1="426" y1="356" x2="450" y2="356" stroke="#6b7280" marker-end="url(#le)"/>
<rect x="452" y="334" width="172" height="44" rx="8" fill="#2563eb" fill-opacity="0.06" stroke="#2563eb"/>
<text class="t" x="538" y="354" text-anchor="middle">④ drop</text>
<text class="ts" x="538" y="370" text-anchor="middle">丢弃 · 下次重算</text>

<text class="ts" x="24" y="398">升级式：仍紧张才进下一级；被淘汰页留 shadow entry，refault 快 → 捞回 promote（workingset 保护）</text>
<text class="ts" x="24" y="418">暖 = active 热 KV   ·   蓝 = inactive 冷 KV / 淘汰去向   ·   虚线 = 守卫（refcnt / 前缀保护）</text>
</svg>

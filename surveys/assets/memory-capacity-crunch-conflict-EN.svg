<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 678" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="12">
  <style>
    .title    { font-size: 16px; font-weight: 600; fill: #222; }
    .subtitle { font-size: 12px; fill: #555; }
    .axis     { stroke: #555; stroke-width: 1; }
    .grid     { stroke: #e6e6e6; stroke-width: 1; stroke-dasharray: 2,3; }
    .muted    { fill: #777; font-size: 11px; }
    .ann      { fill: #333; font-size: 11px; }
    .annbold  { fill: #b03030; font-size: 12px; font-weight: 600; }

    .area-trad { fill: #5589b8; fill-opacity: 0.55; stroke: none; }
    .area-ai   { fill: #e8a35e; fill-opacity: 0.70; stroke: none; }

    .line-cap       { stroke: #1a4f7a; stroke-width: 2.4; fill: none; }
    .line-userAvail { stroke: #1a4f7a; stroke-width: 1.6; fill: none; stroke-dasharray: 6,4; }
    .line-counter   { stroke: #9aa6b2; stroke-width: 1.6; fill: none; stroke-dasharray: 3,4; }
    .line-frozen    { stroke: #1a4f7a; stroke-width: 5; fill: none; stroke-opacity: 0.30; }

    .deficit { fill: #d62828; fill-opacity: 0.28; stroke: none; }
    .projection-bg { fill: #f6f6f0; }
    .dot-cap { fill: #1a4f7a; }
    .leg-box { fill: white; stroke: #bbb; }
    .callout { fill: #fff7f3; stroke: #d9a08c; }
  </style>

  <!-- ===== Title ===== -->
  <text x="420" y="26" text-anchor="middle" class="title">The Squeeze: Phone Memory Demand vs a Price-Frozen Capacity Ceiling (2024 — 2028)</text>
  <text x="420" y="44" text-anchor="middle" class="subtitle">Traditional apps keep growing · RAM froze near 12 GB because DRAM got expensive · reclaim absorbs the gap until it can't.</text>

  <!-- Projection band: mid-2026 onward (x of 2026.5 = 496.25) -->
  <rect x="496.25" y="80" width="243.75" height="440" class="projection-bg"/>
  <text x="618" y="96" text-anchor="middle" class="muted">Projection (2026.5 — 2028)</text>

  <!-- ===== Y grid: every 4 GB, 0..28 ; y(v)=520 - v*15.357 ===== -->
  <g>
    <line x1="90" x2="740" y1="520" y2="520" class="axis"/>
    <text x="84" y="523" text-anchor="end" class="muted">0</text>
    <line x1="90" x2="740" y1="458.57" y2="458.57" class="grid"/><text x="84" y="461.5" text-anchor="end" class="muted">4</text>
    <line x1="90" x2="740" y1="397.14" y2="397.14" class="grid"/><text x="84" y="400" text-anchor="end" class="muted">8</text>
    <line x1="90" x2="740" y1="335.71" y2="335.71" class="grid"/><text x="84" y="338.5" text-anchor="end" class="muted">12</text>
    <line x1="90" x2="740" y1="274.29" y2="274.29" class="grid"/><text x="84" y="277" text-anchor="end" class="muted">16</text>
    <line x1="90" x2="740" y1="212.86" y2="212.86" class="grid"/><text x="84" y="215.5" text-anchor="end" class="muted">20</text>
    <line x1="90" x2="740" y1="151.43" y2="151.43" class="grid"/><text x="84" y="154" text-anchor="end" class="muted">24</text>
    <line x1="90" x2="740" y1="90"     y2="90"     class="grid"/><text x="84" y="93" text-anchor="end" class="muted">28 GB</text>
  </g>

  <!-- ===== X axis: 2024..2028 ===== -->
  <g class="muted">
    <line x1="90" x2="740" y1="520" y2="520" class="axis"/>
    <text x="90"    y="538" text-anchor="middle">2024</text>
    <text x="252.5" y="538" text-anchor="middle">2025</text>
    <text x="415"   y="538" text-anchor="middle">2026</text>
    <text x="577.5" y="538" text-anchor="middle">2027</text>
    <text x="740"   y="538" text-anchor="middle">2028</text>
    <text x="415"   y="554" text-anchor="middle" fill="#666" font-size="11">Year (median flagship)</text>
  </g>

  <!-- =====================================================================
       DEMAND STACK
       trad:  5.3 6.0 7.0 8.2 9.5   (~70% of demand, the main driver)
       total: 6.8 8.0 9.6 11.5 13.5 (trad + on-device AI)
  ===================================================================== -->
  <polygon class="area-trad"
    points="90,520 252.5,520 415,520 577.5,520 740,520
            740,374.11 577.5,394.07 415,412.50 252.5,427.86 90,438.61"/>
  <polygon class="area-ai"
    points="90,438.61 252.5,427.86 415,412.50 577.5,394.07 740,374.11
            740,312.68 577.5,343.39 415,372.57 252.5,397.14 90,415.57"/>

  <!-- =====================================================================
       CAPACITY (frozen): 12 12 12 14 16
  ===================================================================== -->
  <!-- frozen-segment highlight 2024..2026 -->
  <polyline class="line-frozen" points="90,335.71 415,335.71"/>
  <polyline class="line-cap"
    points="90,335.71 252.5,335.71 415,335.71 577.5,305.01 740,274.29"/>
  <g>
    <circle cx="90"    cy="335.71" r="3.5" class="dot-cap"/>
    <circle cx="252.5" cy="335.71" r="3.5" class="dot-cap"/>
    <circle cx="415"   cy="335.71" r="3.5" class="dot-cap"/>
    <circle cx="577.5" cy="305.01" r="3.5" class="dot-cap"/>
    <circle cx="740"   cy="274.29" r="3.5" class="dot-cap"/>
  </g>

  <!-- counterfactual cheap-RAM capacity: 12 14 16 20 24 -->
  <polyline class="line-counter"
    points="90,335.71 252.5,305.01 415,274.29 577.5,212.86 740,151.43"/>

  <!-- user-available = cap - OS/driver/pinned reserve: 9.0 8.6 8.0 9.4 10.8 -->
  <polyline class="line-userAvail"
    points="90,381.79 252.5,387.93 415,397.14 577.5,375.64 740,354.14"/>

  <!-- =====================================================================
       DEFICIT: demand-top above user-available, crossover ~2026
       crossover at (296.8, 390.45)
  ===================================================================== -->
  <polygon class="deficit"
    points="296.8,390.45 415,372.57 577.5,343.39 740,312.68
            740,354.14 577.5,375.64 415,397.14 296.8,390.45"/>
  <circle cx="296.8" cy="390.45" r="4.5" fill="#b03030" stroke="#fff" stroke-width="1.5"/>
  <text x="300" y="382" class="annbold">Crossover ≈ 2026</text>

  <!-- deficit arrow + label -->
  <line x1="610" y1="392" x2="640" y2="362" stroke="#b03030" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="556" y="408" class="annbold">Deficit = working set that won't fit</text>
  <text x="556" y="423" class="ann" fill="#b03030">absorbed by zram compression + lmkd kills</text>

  <!-- =====================================================================
       LABELS
  ===================================================================== -->
  <g class="ann">
    <text x="150" y="478" fill="#1a4f7a">Traditional apps — browser · super-apps · camera/video · games (≈70% of demand)</text>
    <text x="150" y="402" fill="#7a4a10">On-device AI — 1 resident model + KV (secondary)</text>
  </g>

  <!-- frozen capacity label -->
  <text x="96" y="328" class="ann" fill="#1a4f7a" font-weight="600">Flagship LPDDR (median) — frozen ≈12 GB through 2026</text>
  <text x="746" y="277" class="ann" fill="#1a4f7a">16 GB</text>

  <!-- counterfactual label -->
  <text x="746" y="151" class="muted" fill="#7a8694">had RAM stayed cheap</text>
  <text x="746" y="165" class="muted" fill="#7a8694">≈ 24 GB (+19%/yr)</text>

  <!-- user-available label -->
  <text x="746" y="357" class="ann" fill="#1a4f7a">user-available 10.8 GB</text>
  <text x="118" y="377" class="muted" fill="#1a4f7a">user-available (cap − OS/driver/pinned reserve)</text>

  <!-- =====================================================================
       PRICE CALLOUT box (top-left of plot)
  ===================================================================== -->
  <g transform="translate(104,108)">
    <rect x="0" y="0" width="300" height="58" rx="4" class="callout"/>
    <text x="12" y="19" class="annbold" font-size="11.5">Why the ceiling froze — price, not physics</text>
    <text x="12" y="36" class="ann">Mobile DRAM contract: ≈$3/GB (2023) → ≈$20/GB (Q2 2026),</text>
    <text x="12" y="51" class="ann">LTA up to $21/GB. The cheap "just add RAM" fix is gone.</text>
  </g>

  <!-- arrow markers -->
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b03030"/>
    </marker>
  </defs>

  <!-- =====================================================================
       LEGEND
  ===================================================================== -->
  <g transform="translate(90, 572)">
    <rect x="0" y="0" width="820" height="46" class="leg-box"/>
    <rect x="12" y="11" width="18" height="10" class="area-trad"/>
    <text x="36" y="20" class="ann">Traditional apps</text>
    <rect x="150" y="11" width="18" height="10" class="area-ai"/>
    <text x="174" y="20" class="ann">On-device AI (1 model + KV)</text>
    <line x1="360" y1="16" x2="392" y2="16" class="line-cap"/>
    <text x="398" y="20" class="ann">LPDDR capacity (frozen)</text>
    <line x1="560" y1="16" x2="592" y2="16" class="line-userAvail"/>
    <text x="598" y="20" class="ann">User-available</text>

    <line x1="12" y1="35" x2="44" y2="35" class="line-counter"/>
    <text x="50" y="39" class="ann">Counterfactual: capacity had RAM stayed cheap</text>
    <rect x="360" y="30" width="18" height="10" class="deficit"/>
    <text x="384" y="39" class="ann">Deficit (demand &gt; user-available, absorbed by reclaim)</text>
  </g>

  <!-- footnote -->
  <text x="90" y="648" class="muted" font-size="10">
    Median-flagship CAGR: traditional ~16%/yr · AI ~28%/yr · total demand ~19%/yr · realized capacity ~7%/yr (≈0 through 2024–26) · counterfactual ~19%/yr.
  </text>
  <text x="90" y="662" class="muted" font-size="10">
    Sources: TrendForce, IDC, Counterpoint, GSMArena, wccftech 2025–26 (§8). Right of 2026.5 = projection.
  </text>
</svg>

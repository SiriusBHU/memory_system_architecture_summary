<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="12">
  <style>
    .title    { font-size: 16px; font-weight: 600; fill: #222; }
    .subtitle { font-size: 12px; fill: #555; }
    .axis     { stroke: #555; stroke-width: 1; }
    .grid     { stroke: #e6e6e6; stroke-width: 1; stroke-dasharray: 2,3; }
    .label    { fill: #333; }
    .muted    { fill: #777; font-size: 11px; }
    .ann      { fill: #333; font-size: 11px; }
    .annbold  { fill: #b03030; font-size: 12px; font-weight: 600; }

    .area-trad   { fill: #5589b8; fill-opacity: 0.55; stroke: none; }
    .area-aiCons { fill: #e8a35e; fill-opacity: 0.65; stroke: none; }

    .line-cap        { stroke: #1a4f7a; stroke-width: 2; fill: none; }
    .line-userAvail  { stroke: #1a4f7a; stroke-width: 1.5; fill: none; stroke-dasharray: 6,4; }
    .line-aggressive { stroke: #c43c3c; stroke-width: 2.2; fill: none; stroke-dasharray: 6,3; }

    .deficit { fill: #d62828; fill-opacity: 0.30; stroke: none; }
    .projection-bg { fill: #f6f6f0; }

    .dot-cap        { fill: #1a4f7a; }
    .dot-aggressive { fill: #c43c3c; }

    .leg-box  { fill: white; stroke: #bbb; }
  </style>

  <!-- ===== Title ===== -->
  <text x="460" y="26" text-anchor="middle" class="title">The Scissors: End-Device Memory Demand vs Supply (2024 — 2028)</text>
  <text x="460" y="44" text-anchor="middle" class="subtitle">Conservative AI fits; agentic AI does not — deficit opens around 2027 on a median 16–20 GB flagship.</text>

  <!-- ===== Plot area background ===== -->
  <!-- x: 80..720, y: 80..520 -->
  <!-- Year ticks evenly spaced at x = 80, 240, 400, 560, 720 -->

  <!-- Projection band (right side, from x=400 onward = mid-2026 forward) -->
  <rect x="400" y="80" width="320" height="440" class="projection-bg"/>
  <text x="560" y="96" text-anchor="middle" class="muted">Projection (2026.5 — 2028)</text>

  <!-- Y gridlines: every 4 GB, 0..32 -->
  <!-- y(v) = 520 - v * 13.75 -->
  <g>
    <line x1="80" x2="720" y1="520" y2="520" class="axis"/>
    <text x="75" y="523" text-anchor="end" class="muted">0</text>
    <line x1="80" x2="720" y1="465" y2="465" class="grid"/>
    <text x="75" y="468" text-anchor="end" class="muted">4</text>
    <line x1="80" x2="720" y1="410" y2="410" class="grid"/>
    <text x="75" y="413" text-anchor="end" class="muted">8</text>
    <line x1="80" x2="720" y1="355" y2="355" class="grid"/>
    <text x="75" y="358" text-anchor="end" class="muted">12</text>
    <line x1="80" x2="720" y1="300" y2="300" class="grid"/>
    <text x="75" y="303" text-anchor="end" class="muted">16</text>
    <line x1="80" x2="720" y1="245" y2="245" class="grid"/>
    <text x="75" y="248" text-anchor="end" class="muted">20</text>
    <line x1="80" x2="720" y1="190" y2="190" class="grid"/>
    <text x="75" y="193" text-anchor="end" class="muted">24</text>
    <line x1="80" x2="720" y1="135" y2="135" class="grid"/>
    <text x="75" y="138" text-anchor="end" class="muted">28</text>
    <line x1="80" x2="720" y1="80" y2="80" class="grid"/>
    <text x="75" y="83" text-anchor="end" class="muted">32 GB</text>
  </g>

  <!-- X axis ticks: 2024..2028 -->
  <g class="muted">
    <line x1="80" x2="720" y1="520" y2="520" class="axis"/>
    <text x="80"  y="538" text-anchor="middle">2024</text>
    <text x="240" y="538" text-anchor="middle">2025</text>
    <text x="400" y="538" text-anchor="middle">2026</text>
    <text x="560" y="538" text-anchor="middle">2027</text>
    <text x="720" y="538" text-anchor="middle">2028</text>
    <text x="400" y="554" text-anchor="middle" fill="#666" font-size="11">Year (median flagship)</text>
  </g>

  <!-- =====================================================================
       AREAS — stacked: traditional apps (bottom) + conservative AI (middle)
       Points (x, GB):
         year   x      trad   trad+aiCons
         2024   80     4.0    5.5
         2025   240    5.0    7.5
         2026   400    6.0    9.5
         2027   560    7.0   11.5
         2028   720    8.0   13.5
       y(v) = 520 - v*13.75
  ===================================================================== -->

  <!-- Traditional apps (blue area) -->
  <polygon class="area-trad"
    points="80,520 240,520 400,520 560,520 720,520
            720,410 560,423.75 400,437.5 240,451.25 80,465"/>

  <!-- Conservative AI (orange area) on top of traditional -->
  <polygon class="area-aiCons"
    points="80,465 240,451.25 400,437.5 560,423.75 720,410
            720,334.38 560,361.88 400,389.38 240,416.88 80,444.38"/>

  <!-- =====================================================================
       LINES
  ===================================================================== -->

  <!-- LPDDR capacity (solid dark blue) -->
  <polyline class="line-cap"
    points="80,355 240,300 400,300 560,245 720,190"/>
  <g>
    <circle cx="80"  cy="355" r="3.5" class="dot-cap"/>
    <circle cx="240" cy="300" r="3.5" class="dot-cap"/>
    <circle cx="400" cy="300" r="3.5" class="dot-cap"/>
    <circle cx="560" cy="245" r="3.5" class="dot-cap"/>
    <circle cx="720" cy="190" r="3.5" class="dot-cap"/>
  </g>

  <!-- User-available memory (dashed blue, capacity minus OS/driver/system reserve) -->
  <polyline class="line-userAvail"
    points="80,396.25 240,355 400,355 560,313.75 720,272.5"/>

  <!-- Aggressive AI demand line (dashed red) — traditional + aggressive AI:
       2024 5.5  → 444.38
       2025 7.5  → 416.88
       2026 11   → 368.75
       2027 17   → 286.25
       2028 24   → 190
  -->
  <polyline class="line-aggressive"
    points="80,444.38 240,416.88 400,368.75 560,286.25 720,190"/>
  <g>
    <circle cx="80"  cy="444.38" r="3.5" class="dot-aggressive"/>
    <circle cx="240" cy="416.88" r="3.5" class="dot-aggressive"/>
    <circle cx="400" cy="368.75" r="3.5" class="dot-aggressive"/>
    <circle cx="560" cy="286.25" r="3.5" class="dot-aggressive"/>
    <circle cx="720" cy="190"    r="3.5" class="dot-aggressive"/>
  </g>

  <!-- =====================================================================
       DEFICIT POLYGON — where aggressive demand exceeds user-available
       User-available crosses aggressive between 2026 (12 vs 11) and 2027 (15 vs 17).
       Solve crossover: linear interp on x in [400,560]
         avail(x): 12 → 15 (slope +3 over 160 px)  → avail(x) = 12 + 3*(x-400)/160
         agg(x):   11 → 17 (slope +6 over 160 px)  → agg(x)   = 11 + 6*(x-400)/160
         cross: 12 + 3t = 11 + 6t → t=1/3  → x = 400 + 160*(1/3) ≈ 453.3
         GB at crossover = 12 + 1 = 13
         y at GB=13: 520 - 13*13.75 = 341.25
       Deficit polygon from (453.3, 341.25) along aggressive line to (720, 190),
       then back along user-available to (720, 272.5) → (560, 313.75) → (453.3, 341.25)
  ===================================================================== -->
  <polygon class="deficit"
    points="453.3,341.25 560,286.25 720,190
            720,272.5 560,313.75 453.3,341.25"/>

  <!-- Annotation arrow at deficit -->
  <line x1="600" y1="240" x2="640" y2="220" stroke="#b03030" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="610" y="232" class="annbold">Deficit zone</text>
  <text x="612" y="248" class="annbold" font-size="11" font-weight="500">demand &gt; user-available</text>

  <!-- Crossover marker -->
  <circle cx="453.3" cy="341.25" r="4.5" fill="#b03030" stroke="#fff" stroke-width="1.5"/>
  <text x="455" y="332" class="annbold">Crossover ≈ 2027</text>

  <!-- =====================================================================
       VALUE LABELS on areas / lines
  ===================================================================== -->
  <g class="ann">
    <!-- Traditional apps label -->
    <text x="160" y="495" fill="#1a4f7a">Traditional apps (browser, messengers, photos)</text>
    <!-- Conservative AI label -->
    <text x="160" y="430" fill="#7a4a10">On-device AI — conservative (1 model, ≤32K ctx)</text>
    <!-- Capacity line label -->
    <text x="86" y="346" fill="#1a4f7a">Flagship LPDDR capacity (median)</text>
    <text x="725" y="194" fill="#1a4f7a">24 GB</text>
    <text x="80" y="346" text-anchor="end" class="muted"></text>
    <!-- User-available label -->
    <text x="86" y="389" fill="#1a4f7a">User-available (cap − OS/driver reserve)</text>
    <text x="725" y="276" fill="#1a4f7a">18 GB</text>
    <!-- Aggressive line label -->
    <text x="86" y="441" fill="#b03030">Demand: trad + aggressive AI (agentic, 128K+ ctx, multi-model)</text>
    <text x="725" y="194" fill="#b03030" text-anchor="start" dx="36">↑ touches 24 GB ceiling</text>
  </g>

  <!-- Defs: arrow markers -->
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b03030"/>
    </marker>
  </defs>

  <!-- =====================================================================
       LEGEND box (bottom)
  ===================================================================== -->
  <g transform="translate(80, 568)">
    <rect x="0" y="0" width="780" height="44" class="leg-box"/>

    <rect x="10" y="10" width="18" height="10" class="area-trad"/>
    <text x="34" y="20" class="ann">Traditional apps</text>

    <rect x="160" y="10" width="18" height="10" class="area-aiCons"/>
    <text x="184" y="20" class="ann">Conservative AI (single resident model)</text>

    <line x1="420" y1="15" x2="450" y2="15" class="line-cap"/>
    <text x="456" y="20" class="ann">LPDDR total</text>

    <line x1="540" y1="15" x2="570" y2="15" class="line-userAvail"/>
    <text x="576" y="20" class="ann">User-available</text>

    <line x1="10" y1="34" x2="40" y2="34" class="line-aggressive"/>
    <text x="46" y="38" class="ann">Aggressive AI demand (trad + agentic + 128K KV + multi-model)</text>

    <rect x="540" y="29" width="18" height="10" class="deficit"/>
    <text x="564" y="38" class="ann">Deficit (demand &gt; user-available)</text>
  </g>

  <!-- =====================================================================
       Footnote (annual growth rates)
  ===================================================================== -->
  <text x="80" y="612" class="muted">
    Annual growth (median flagship): LPDDR capacity ~17%/yr · traditional apps ~18%/yr · conservative AI ~37%/yr · aggressive AI demand ~45%/yr from 2026 — caveat: 2026.5+ values are projections.
  </text>
</svg>

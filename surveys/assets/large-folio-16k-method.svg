<svg viewBox="0 0 880 660" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'PingFang SC','Microsoft YaHei',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="660" fill="#ffffff"/>
  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">方案图：mTHP「按需放大 + 平滑回退」分配路径</text>
  <text x="440" y="54" text-anchor="middle" font-size="12" fill="#64748b">Linux 动态放大粒度 · 对照苹果固定 16K · 编号对应正文五步 · * = 放大粒度的关键机制</text>

  <!-- 1 fault -->
  <circle cx="146" cy="98" r="13" fill="#0f172a"/><text x="146" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <rect x="172" y="76" width="336" height="44" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="340" y="103" text-anchor="middle" font-size="13" fill="#1e293b">① 匿名缺页：触到一段未映射的匿名内存</text>
  <line x1="340" y1="120" x2="340" y2="142" stroke="#475569" marker-end="url(#a)"/>

  <!-- 2 pick order -->
  <circle cx="146" cy="170" r="13" fill="#0f172a"/><text x="146" y="174" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <rect x="172" y="144" width="336" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="340" y="166" text-anchor="middle" font-size="12.5" fill="#1e293b">② 选阶：挑该 VMA 允许 &amp; 对齐的最大 mTHP 阶</text>
  <text x="340" y="183" text-anchor="middle" font-size="11.5" fill="#64748b">如 64K = order-4（@4K 基页），优先大阶</text>
  <text x="340" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">* 苹果 16K = 固定单一粒度，无此步、也无回退</text>
  <line x1="340" y1="202" x2="340" y2="224" stroke="#475569" marker-end="url(#a)"/>

  <!-- 3 try alloc -->
  <circle cx="146" cy="252" r="13" fill="#0f172a"/><text x="146" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <rect x="172" y="226" width="336" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="340" y="257" text-anchor="middle" font-size="13" fill="#1e293b">③ 试分配：向 buddy 要这一阶连续物理块</text>

  <!-- 5 fallback (right) -->
  <circle cx="566" cy="232" r="13" fill="#ea580c"/><text x="566" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">5</text>
  <rect x="590" y="210" width="262" height="74" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="721" y="234" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9a3412">⑤ 降一档（平滑回退）</text>
  <text x="721" y="252" text-anchor="middle" font-size="12" fill="#9a3412">64K→32K→16K→…→4K(order-0)</text>
  <text x="721" y="270" text-anchor="middle" font-size="11" fill="#b45309">回到 ③ 重试，绝不「全有或全无」</text>
  <!-- fail arrow 3 -> 5 -->
  <line x1="508" y1="258" x2="590" y2="258" stroke="#ea580c" marker-end="url(#ao)"/>
  <text x="549" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">失败</text>
  <!-- retry arrow 5 -> 3 (dashed, above) -->
  <path d="M590,224 L510,224" stroke="#ea580c" stroke-dasharray="5 4" fill="none" marker-end="url(#ao)"/>
  <text x="549" y="218" text-anchor="middle" font-size="10.5" fill="#c2410c">降阶重试</text>

  <!-- success arrow 3 -> 4 -->
  <line x1="340" y1="278" x2="340" y2="304" stroke="#475569" marker-end="url(#a)"/>
  <text x="372" y="296" text-anchor="middle" font-size="11" fill="#475569">成功</text>

  <!-- 4 map -->
  <circle cx="146" cy="330" r="13" fill="#0f172a"/><text x="146" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <rect x="172" y="306" width="336" height="50" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="340" y="328" text-anchor="middle" font-size="12.5" fill="#1e293b">④ 批量映射：large folio = N 个连续 PTE</text>
  <text x="340" y="345" text-anchor="middle" font-size="11.5" fill="#64748b">PTE-mapped（非 PMD 整块）</text>
  <line x1="340" y1="356" x2="340" y2="380" stroke="#ea580c" marker-end="url(#ao)"/>

  <!-- ARM64 coalesce (new mechanism) -->
  <rect x="172" y="382" width="336" height="52" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="340" y="404" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9a3412">* ARM64：给连续 PTE 打 contiguous bit</text>
  <text x="340" y="421" text-anchor="middle" font-size="11.5" fill="#b45309">（架构机制）或经 HPA（微架构）</text>
  <line x1="340" y1="434" x2="340" y2="458" stroke="#059669" marker-end="url(#ag)"/>

  <!-- payoff -->
  <rect x="172" y="460" width="336" height="56" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="340" y="483" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">合并成 1 个 TLB 项</text>
  <text x="340" y="502" text-anchor="middle" font-size="12" fill="#047857">⇒ reach ×4~×16、缺页 ÷4~÷16</text>

  <!-- payoff metrics callout -->
  <rect x="556" y="382" width="296" height="134" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="572" y="404" font-size="12" font-weight="700" fill="#334155">实测收益（同改动）</text>
  <text x="572" y="425" font-size="11.5" fill="#475569">· Memcached 64K mTHP：吞吐 +20%</text>
  <text x="572" y="444" font-size="11.5" fill="#475569">· 延迟 −10~30%，内核编译 +5%</text>
  <text x="572" y="463" font-size="11.5" fill="#475569">· NVIDIA 个别负载 10×</text>
  <text x="572" y="486" font-size="11.5" font-weight="600" fill="#b45309">遗留代价：</text>
  <text x="572" y="504" font-size="11.5" fill="#b45309">长跑碎片，2h 后大阶失败率 &gt;90%</text>

  <!-- bottom contrast note -->
  <rect x="172" y="546" width="536" height="44" rx="8" fill="#fcfcfd" stroke="#e2e8f0"/>
  <text x="440" y="564" text-anchor="middle" font-size="12" fill="#475569">对照原方案：2MB THP = 整段 order-9，凑不齐直接退 4K（全有或全无）</text>
  <text x="440" y="582" text-anchor="middle" font-size="11" fill="#94a3b8">苹果以「固定 16K」绕开回退与碎片；Linux 以「灵活多尺寸」换鲁棒性</text>

  <!-- legend -->
  <rect x="172" y="606" width="536" height="34" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="190" y="617" width="16" height="12" rx="2" fill="#fff7ed" stroke="#ea580c"/>
  <text x="212" y="627" font-size="11.5" fill="#475569">* 放大粒度的关键机制</text>
  <rect x="392" y="617" width="16" height="12" rx="2" fill="#ecfdf5" stroke="#059669"/>
  <text x="414" y="627" font-size="11.5" fill="#475569">TLB 合并兑现收益</text>
  <rect x="566" y="617" width="16" height="12" rx="2" fill="#ffffff" stroke="#94a3b8"/>
  <text x="588" y="627" font-size="11.5" fill="#475569">中性 / 对照步骤</text>
</svg>

<svg width="100%" viewBox="0 0 680 290" role="img" xmlns="http://www.w3.org/2000/svg">
<title>内存系统与存储 I/O 栈在 page cache 交界</title>
<desc>用户态 I/O 入口经 page cache（属内存系统 2B）与存储 I/O 栈交互；O_DIRECT 绕过 page cache 直达设备。</desc>
<style>
svg{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
--bg:#ffffff;
--gf:#f3f4f6;--gs:#cfd3d9;--gi:#3a3f47;
--tf:#d9efe9;--ts:#74b8a8;--ti:#0f5446;
--ink2:#6b6f76;--coral:#c0654e;--arrow:#9aa3ad}
@media (prefers-color-scheme:dark){svg{--bg:#17191d;
--gf:#2a2e35;--gs:#474d56;--gi:#cdd2d9;
--tf:#123f39;--ts:#2f7d6e;--ti:#8fd8c8;
--ink2:#9aa0a8;--coral:#e0876e;--arrow:#8a929b}}
.bg{fill:var(--bg)}
.s2{font-size:12px;fill:var(--ink2)}
.gray rect{fill:var(--gf);stroke:var(--gs)}.gray .t{font-size:14px;font-weight:500;fill:var(--gi)}.gray .s{font-size:12px;fill:var(--gi);opacity:.9}
.teal rect{fill:var(--tf);stroke:var(--ts)}.teal .t{font-size:14px;font-weight:500;fill:var(--ti)}.teal .s{font-size:12px;fill:var(--ti);opacity:.95}
</style>
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--arrow)"/></marker>
<marker id="ac" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--coral)"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="680" height="290"/>
<g class="gray">
<rect x="44" y="80" width="150" height="150" rx="8"/>
<text class="t" x="56" y="104">用户态 I/O 入口</text>
<text class="s" x="56" y="130">read/write（缓冲）</text>
<text class="s" x="56" y="154">mmap 文件映射</text>
<text class="s" x="56" y="178">O_DIRECT 直接 I/O</text>
</g>
<g class="teal">
<rect x="258" y="80" width="170" height="150" rx="8"/>
<text class="t" x="270" y="104">page cache 页缓存</text>
<text class="s" x="270" y="124">= 内存系统 2B</text>
<text class="s" x="270" y="152">文件页 · file LRU</text>
<text class="s" x="270" y="174">脏页 → 待回写</text>
<text class="s" x="270" y="196">干净页 → 可直接丢</text>
</g>
<g class="gray">
<rect x="500" y="44" width="140" height="222" rx="8"/>
<text class="t" x="512" y="68">存储 I/O 栈</text>
<text class="s" x="512" y="86">邻接子系统</text>
<text class="t" x="512" y="122">VFS</text>
<text class="t" x="512" y="152">文件系统</text>
<text class="s" x="512" y="174">ext4 / f2fs / APFS</text>
<text class="t" x="512" y="206">块层 · I/O 调度</text>
<text class="t" x="512" y="236">驱动 · 设备</text>
</g>
<line x1="194" y1="128" x2="256" y2="128" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#ag)"/>
<text class="s2" x="208" y="120">缓冲</text>
<line x1="428" y1="118" x2="498" y2="118" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#ag)"/>
<text class="s2" x="452" y="110">回写</text>
<line x1="500" y1="152" x2="430" y2="152" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#ag)"/>
<text class="s2" x="452" y="170">预读</text>
<polyline points="119,230 119,252 500,252" fill="none" stroke="var(--coral)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ac)"/>
<text x="300" y="270" text-anchor="middle" font-size="12px" fill="var(--coral)">O_DIRECT：绕过页缓存，直达块层 / 设备</text>
</svg>

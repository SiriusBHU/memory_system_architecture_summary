<svg width="100%" viewBox="0 0 680 1116" role="img" xmlns="http://www.w3.org/2000/svg">
<title>内存系统整合架构（四层 + 存储 I/O 交界）</title>
<desc>五条带：用户态、内核内存管理（2A 地址空间侧 / 2B 物理与回收侧）、内存管理硬件、存储层级、邻接的存储 I/O 栈；底部列出内存与存储的交界配合。</desc>
<style>
svg{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
--bg:#ffffff;--cardf:#fafafa;--bd:#e3e3e0;--ink:#1f2024;--ink2:#6b6f76;--arrow:#9aa3ad;
--gf:#f3f4f6;--gs:#cfd3d9;--gi:#3a3f47;
--tf:#d9efe9;--ts:#74b8a8;--ti:#0f5446;
--pf:#e9e3f6;--ps:#a489d6;--pi:#4a356f}
@media (prefers-color-scheme:dark){svg{--bg:#17191d;--cardf:#212429;--bd:#3a3f47;--ink:#e7e9ec;--ink2:#9aa0a8;--arrow:#8a929b;
--gf:#2a2e35;--gs:#474d56;--gi:#cdd2d9;
--tf:#123f39;--ts:#2f7d6e;--ti:#8fd8c8;
--pf:#2b2547;--ps:#5f4d92;--pi:#cabdee}}
.bg{fill:var(--bg)}
.card{fill:var(--cardf);stroke:var(--bd)}
.note{fill:var(--cardf);stroke:var(--gs)}
.h{font-size:14px;font-weight:600;fill:var(--ink)}
.s2{font-size:12px;fill:var(--ink2)}
.gray rect{fill:var(--gf);stroke:var(--gs)}.gray .t{font-size:14px;font-weight:500;fill:var(--gi)}.gray .s{font-size:12px;fill:var(--gi);opacity:.9}
.teal rect{fill:var(--tf);stroke:var(--ts)}.teal .t{font-size:14px;font-weight:500;fill:var(--ti)}.teal .s{font-size:12px;fill:var(--ti);opacity:.9}
.purple rect{fill:var(--pf);stroke:var(--ps)}.purple .t{font-size:14px;font-weight:500;fill:var(--pi)}.purple .s{font-size:12px;fill:var(--pi);opacity:.9}
</style>
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--arrow)"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="680" height="1116"/>

<rect class="card" x="40" y="40" width="600" height="100" rx="8"/>
<text class="h" x="52" y="65">① 用户态 user space</text>
<g class="gray">
<rect x="52" y="76" width="135" height="48" rx="6"/><text class="t" x="64" y="97">进程地址空间</text><text class="s" x="64" y="114">堆·栈·代码·映射</text>
<rect x="199" y="76" width="135" height="48" rx="6"/><text class="t" x="211" y="97">用户态分配器</text><text class="s" x="211" y="114">scudo·jemalloc</text>
<rect x="346" y="76" width="135" height="48" rx="6"/><text class="t" x="358" y="97">内存系统调用</text><text class="s" x="358" y="114">mmap·madvise</text>
<rect x="493" y="76" width="135" height="48" rx="6"/><text class="t" x="505" y="97">内存度量</text><text class="s" x="505" y="114">VSS·RSS·PSS·USS</text>
</g>

<rect class="card" x="40" y="154" width="600" height="512" rx="8"/>
<text class="h" x="52" y="178">② 操作系统内存管理（内核）</text>
<text class="s2" x="52" y="197">2A 地址空间侧 ↔ 2B 物理与回收侧：缺页→建页表，回收→拆页表·换出</text>
<text class="h" x="52" y="218">2A 地址空间侧</text>
<text class="h" x="354" y="218">2B 物理与回收侧</text>
<g class="purple">
<rect x="52" y="226" width="282" height="48" rx="6"/><text class="t" x="64" y="247">页表管理 PGD~PTE</text><text class="s" x="64" y="264">多级页表 · TTBR0/1 · MMU 遍历</text>
<rect x="52" y="280" width="282" height="48" rx="6"/><text class="t" x="64" y="301">VMA 管理</text><text class="s" x="64" y="318">vm_area_struct · maple tree</text>
<rect x="52" y="334" width="282" height="48" rx="6"/><text class="t" x="64" y="355">缺页处理 page fault</text><text class="s" x="64" y="372">minor / major</text>
<rect x="52" y="388" width="282" height="48" rx="6"/><text class="t" x="64" y="409">按需分页 · COW</text><text class="s" x="64" y="426">惰性分配 · 写时复制</text>
<rect x="52" y="442" width="282" height="48" rx="6"/><text class="t" x="64" y="463">地址空间布局</text><text class="s" x="64" y="480">用户区 / 内核区 · TTBR0/1</text>
</g>
<g class="teal">
<rect x="354" y="226" width="282" height="48" rx="6"/><text class="t" x="366" y="247">物理页管理</text><text class="s" x="366" y="264">伙伴系统 · Zone · 页帧 · 水线</text>
<rect x="354" y="280" width="282" height="48" rx="6"/><text class="t" x="366" y="301">内核分配器</text><text class="s" x="366" y="318">slab · slub · vmalloc</text>
<rect x="354" y="334" width="282" height="48" rx="6"/><text class="t" x="366" y="355">设备 / 驱动内存（DMA·GPU）</text><text class="s" x="366" y="372">dma-buf · CMA · GPU 显存（pinned）</text>
<rect x="354" y="388" width="282" height="48" rx="6"/><text class="t" x="366" y="409">LRU 链</text><text class="s" x="366" y="426">匿名页 · 文件页 · MGLRU</text>
<rect x="354" y="442" width="282" height="48" rx="6"/><text class="t" x="366" y="463">page cache 页缓存</text><text class="s" x="366" y="480">文件页 = file LRU</text>
<rect x="354" y="496" width="282" height="48" rx="6"/><text class="t" x="366" y="517">回收与换页</text><text class="s" x="366" y="534">kswapd · shrinker · force · zram</text>
<rect x="354" y="550" width="282" height="48" rx="6"/><text class="t" x="366" y="571">资源隔离与限额（memcg）</text><text class="s" x="366" y="588">cgroup 统计 · 限额 · per-memcg LRU</text>
<rect x="354" y="604" width="282" height="48" rx="6"/><text class="t" x="366" y="625">压力与终止</text><text class="s" x="366" y="642">PSI + 水线 → LMK/LMKD → OOM</text>
</g>

<rect class="card" x="40" y="680" width="600" height="100" rx="8"/>
<text class="h" x="52" y="705">③ 内存管理硬件 memory-management hardware</text>
<g class="gray">
<rect x="52" y="716" width="182" height="48" rx="6"/><text class="t" x="64" y="737">MMU · TLB</text><text class="s" x="64" y="754">虚实地址转换 · 缓存</text>
<rect x="248" y="716" width="182" height="48" rx="6"/><text class="t" x="260" y="737">内存控制器</text><text class="s" x="260" y="754">DRAM 调度 · 刷新</text>
<rect x="444" y="716" width="182" height="48" rx="6"/><text class="t" x="456" y="737">IOMMU/SMMU · DMA</text><text class="s" x="456" y="754">设备地址转换</text>
</g>

<rect class="card" x="40" y="794" width="600" height="100" rx="8"/>
<text class="h" x="52" y="819">④ 存储层级 memory hierarchy（快·小 → 慢·大）</text>
<g class="gray">
<rect x="52" y="830" width="135" height="48" rx="6"/><text class="t" x="64" y="851">寄存器</text><text class="s" x="64" y="868">最快 · 最小</text>
<rect x="199" y="830" width="135" height="48" rx="6"/><text class="t" x="211" y="851">缓存 Cache</text><text class="s" x="211" y="868">L1/L2/L3 · SRAM</text>
<rect x="346" y="830" width="135" height="48" rx="6"/><text class="t" x="358" y="851">主存 DRAM</text><text class="s" x="358" y="868">LPDDR</text>
<rect x="493" y="830" width="135" height="48" rx="6"/><text class="t" x="505" y="851">闪存</text><text class="s" x="505" y="868">UFS · eMMC</text>
</g>

<rect class="card" x="40" y="908" width="600" height="100" rx="8"/>
<text class="h" x="52" y="933">邻接子系统 · 存储 I/O 栈（文件系统 / 块层）</text>
<g class="gray">
<rect x="52" y="944" width="135" height="48" rx="6"/><text class="t" x="64" y="965">VFS</text><text class="s" x="64" y="982">统一文件接口</text>
<rect x="199" y="944" width="135" height="48" rx="6"/><text class="t" x="211" y="965">文件系统</text><text class="s" x="211" y="982">ext4·f2fs·APFS</text>
<rect x="346" y="944" width="135" height="48" rx="6"/><text class="t" x="358" y="965">块层·I/O 调度</text><text class="s" x="358" y="982">合并 · 排序</text>
<rect x="493" y="944" width="135" height="48" rx="6"/><text class="t" x="505" y="965">驱动·设备</text><text class="s" x="505" y="982">UFS·eMMC = ④</text>
</g>
<line x1="187" y1="968" x2="197" y2="968" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#ag)"/>
<line x1="334" y1="968" x2="344" y2="968" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#ag)"/>
<line x1="481" y1="968" x2="491" y2="968" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#ag)"/>

<rect class="note" x="40" y="1022" width="600" height="78" rx="8"/>
<text class="h" x="52" y="1046">交界配合（内存 ⇄ 存储 I/O）</text>
<text class="s2" x="52" y="1070">· page cache（2B）⇄ 文件系统：预读 / 缺页填充、脏页回写</text>
<text class="s2" x="52" y="1090">· O_DIRECT（①）⇢ 块层：绕过页缓存　·　换页（2B）⇢ swap：移动端 zram 不落盘</text>
</svg>

<text x="44" y="492" font-size="11.5" fill="#64748b">冷热只分两档 · 压力 = 杀后台 = 冷启动（86.6% &gt;1s）</text>
<text x="616" y="492" font-size="11.5" fill="16A34A" font-weight="600">冷页逐级下沉而非被杀 · 冷启动 2s→690ms · 直接回收 −67.9% · 保活 1.85×</text>

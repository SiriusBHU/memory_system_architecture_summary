<text x="44" y="396" font-size="11.5" fill="#64748b">策略编译进内核 · 长跑碎片化使大页失效 · 查杀错位</text>
<text x="616" y="396" font-size="11.5" fill="0D9488" font-weight="600">策略点可编程、随负载自适应（mTHP·DAMON·SWAM·Ariadne·AppFlow）</text>

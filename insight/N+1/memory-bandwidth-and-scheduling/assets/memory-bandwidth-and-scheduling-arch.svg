<text x="878" y="288" font-size="11" fill="#64748b">零拷贝共享 KV</text>
<rect x="616" y="306" width="500" height="66" rx="9" fill="#FFF1E8" stroke="EA580C" stroke-width="2"/>
<circle cx="632" cy="322" r="9" fill="EA580C"/><text x="632" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">*</text>
<text x="648" y="331" font-size="13.5" font-weight="700" fill="#0f172a">LPDDR5X 内存子系统</text>
<text x="632" y="353" font-size="11" fill="#334155">4ch 10.7Gbps · 85.6 GB/s · 32GB · 负载自适应功耗</text>
<text x="44" y="396" font-size="11.5" fill="#64748b">带宽供给卡 ~51GB/s · 单 IP 仅用满 ~60% · 持续负载热降频</text>
<text x="616" y="396" font-size="11.5" fill="EA580C" font-weight="600">带宽 +67% · 利用率 60%→88% · reactive 延迟 −4.6×</text>

<rect x="0" y="0" width="1160" height="418" fill="#ffffff"/>
<text x="580.0" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">内存带宽架构：窄管+独占  vs  宽管+榨满</text>

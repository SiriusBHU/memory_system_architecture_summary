<text x="60" y="331" font-size="13.5" font-weight="700" fill="#0f172a">LPDDR5 内存子系统</text>
<text x="60" y="353" font-size="11" fill="#334155">4ch 6.4Gbps · 峰值 51.2 GB/s · 16GB</text>

<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>
<rect x="0" y="0" width="1160" height="514" fill="#ffffff"/>
<text x="580.0" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">ARM 内存安全架构：软件 Sanitizer + TrustZone  vs  MTE + CCA/RME 四世界</text>

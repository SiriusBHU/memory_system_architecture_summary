<text x="582" y="256.0" text-anchor="middle" font-size="11" font-weight="700" fill="DC2626">演进</text>
<rect x="24" y="64" width="540" height="32" rx="8" fill="475569"/>
<text x="294" y="85" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">原始 — 软件 Sanitizer + TrustZone</text>

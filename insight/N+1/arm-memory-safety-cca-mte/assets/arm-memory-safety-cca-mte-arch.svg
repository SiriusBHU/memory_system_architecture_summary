<text x="60" y="353" font-size="11" fill="#334155">TA：DRM/密钥/支付 · 共享 Trusted OS（大 TCB）· 16–64MiB 静态</text>
<line x1="294" y1="370" x2="294" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="44" y="402" width="500" height="66" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
<text x="60" y="427" font-size="13.5" font-weight="700" fill="#0f172a">Secure Monitor (EL3)</text>

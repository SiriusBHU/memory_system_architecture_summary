<text x="60" y="139" font-size="13.5" font-weight="700" fill="#0f172a">Normal World (EL0–EL2)</text>
<text x="60" y="161" font-size="11" fill="#334155">App 无保护 · App+ASan 2× 开销 · Guest VM 无隔离</text>
<line x1="294" y1="178" x2="294" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="44" y="210" width="500" height="66" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
<text x="60" y="235" font-size="13.5" font-weight="700" fill="#0f172a">Linux 内核 + Hypervisor</text>
<text x="60" y="257" font-size="11" fill="#334155">可完全访问所有 Normal-world 内存</text>
<line x1="294" y1="274" x2="294" y2="304" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="306" y="288" font-size="11" fill="#64748b">SMC 调用</text>

<text x="632" y="161" font-size="11" fill="#334155">Root Monitor 管理世界切换 + GPT</text>
<line x1="866" y1="178" x2="866" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="878" y="192" font-size="11" fill="#64748b">GPT 分派</text>
<rect x="616" y="210" width="500" height="66" rx="9" fill="#FDECEC" stroke="DC2626" stroke-width="2"/>
<circle cx="632" cy="226" r="9" fill="DC2626"/><text x="632" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">*</text>
<text x="648" y="235" font-size="13.5" font-weight="700" fill="#0f172a">四世界：Secure · Realm · Normal</text>
<text x="632" y="257" font-size="11" fill="#334155">Realm VM：ML 推理 / 机密负载(RMM 隔离) · Normal：App + MTE ~1–5%</text>
<line x1="866" y1="274" x2="866" y2="304" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="878" y="288" font-size="11" fill="#64748b">硬件强制</text>
<rect x="616" y="306" width="500" height="66" rx="9" fill="#FDECEC" stroke="DC2626" stroke-width="2"/>
<circle cx="632" cy="322" r="9" fill="DC2626"/><text x="632" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">*</text>
<text x="648" y="331" font-size="13.5" font-weight="700" fill="#0f172a">GPC / GPT 每核硬件单元</text>
<text x="632" y="353" font-size="11" fill="#334155">每 4KB 粒度映射四世界之一 · NS↔Realm 运行时动态分配</text>
<text x="44" y="492" font-size="11.5" fill="#64748b">二元划分 · 内存静态分区 · TCB 共享 · 开发者受厂商门控</text>
<text x="616" y="492" font-size="11.5" fill="DC2626" font-weight="600">四世界硬件强制隔离 + MTE 低开销内存标签（~1–5%）</text>

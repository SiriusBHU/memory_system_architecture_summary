<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,Noto Sans CJK SC,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker>
    <marker id="arEvo" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#0d9488"/></marker>
  </defs>
  <rect x="0" y="0" width="1280" height="860" fill="#ffffff"/>
  <text x="640" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">存储 / 内存 / 缓存介质创新全景 · N+3 调研的八个洞察</text>
  <text x="640" y="56" text-anchor="middle" font-size="13" fill="#64748b">片上缓存（SRAM→MRAM）→ 主存（LPDDR6 / HBM4）→ eNVM（ReRAM / STT-MRAM）→ 存储（UFS 5.0）→ 模拟存算（ECRAM / FeFET）</text>

  <style>
    .badge{fill:#1e293b}
    .bt{fill:#fff;font-size:14px;font-weight:700;text-anchor:middle}
    .lbl{fill:#0f172a;font-weight:700}
    .sub{fill:#334155;font-size:12.5px}
    .chip{fill:#ffffff;stroke-width:1}
    .evo{fill:#f0fdf4;stroke:#16a34a;stroke-width:1.5}
    .cur{fill:#fef2f2;stroke:#dc2626;stroke-width:1;stroke-dasharray:4,3}
  </style>

  <!-- Left axis labels -->
  <text x="18" y="240" text-anchor="middle" font-size="13" fill="#64748b" transform="rotate(-90,18,240)">快 / 小容量 ←———→ 慢 / 大容量</text>

  <!-- Right side: maturity legend -->
  <rect x="1140" y="68" width="120" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="1152" y="78" width="14" height="10" rx="3" fill="#16a34a" opacity="0.3"/><text x="1172" y="88" font-size="11" fill="#334155">近期（2025-27）</text>
  <rect x="1152" y="96" width="14" height="10" rx="3" fill="#7c3aed" opacity="0.3"/><text x="1172" y="106" font-size="11" fill="#334155">远期（2028+）</text>

  <!-- ═══ Level 1: 片上缓存 (L1→LLC) ═══ -->
  <rect x="40" y="70" width="1088" height="114" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="56" y="94" class="lbl" font-size="16">片上缓存（L1 → L2 → LLC）</text>

  <!-- Current: SRAM problem -->
  <rect x="56" y="104" width="240" height="52" rx="8" class="cur"/>
  <text x="72" y="122" font-size="12.5" font-weight="700" fill="#991b1b">现状：6T-SRAM</text>
  <text x="72" y="140" class="sub" font-size="11.5">Sub-5nm 面积停滞 · 漏电达总功耗 50%</text>
  <text x="72" y="152" class="sub" font-size="11.5">占 AI 处理器面积 50–70%</text>

  <!-- Arrow -->
  <text x="306" y="132" font-size="16" fill="#0d9488">→</text>

  <!-- SOT-MRAM -->
  <rect x="326" y="104" width="230" height="52" rx="8" class="evo"/>
  <text x="342" y="122" font-size="12.5" font-weight="700" fill="#14532d">SOT-MRAM（远期 SRAM 替代）</text>
  <text x="342" y="140" class="sub" font-size="11.5">3 端 · sub-ns 切换 · 零待机漏电</text>
  <text x="342" y="152" class="sub" font-size="11.5">耐久 >10¹⁵ 次 · 面积更小</text>
  <circle cx="540" cy="118" r="13" class="badge"/><text x="540" y="123" class="bt" font-size="13">1</text>

  <!-- STT-MRAM LLC -->
  <rect x="570" y="104" width="240" height="52" rx="8" class="evo"/>
  <text x="586" y="122" font-size="12.5" font-weight="700" fill="#14532d">STT-MRAM LLC（近期商用化）</text>
  <text x="586" y="140" class="sub" font-size="11.5">2.3× 密度 · BEOL 集成 · 非易失</text>
  <text x="586" y="152" class="sub" font-size="11.5">32MB LLC 漏电可超计算核动态功耗</text>
  <circle cx="794" cy="118" r="13" class="badge"/><text x="794" y="123" class="bt" font-size="13">2</text>

  <!-- Hybrid -->
  <rect x="824" y="104" width="288" height="52" rx="8" class="evo"/>
  <text x="840" y="122" font-size="12.5" font-weight="700" fill="#14532d">混合 SRAM-MRAM 缓存架构</text>
  <text x="840" y="140" class="sub" font-size="11.5">L1 保留 SRAM · L2/LLC 换 MRAM</text>
  <text x="840" y="152" class="sub" font-size="11.5">释放 20–30% 面积 · 断电保持状态</text>
  <circle cx="1096" cy="118" r="13" class="badge"/><text x="1096" y="123" class="bt" font-size="13">8</text>

  <!-- ═══ Separator ═══ -->
  <line x1="180" y1="184" x2="180" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="640" y1="184" x2="640" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Level 2: 主存 DRAM ═══ -->
  <rect x="40" y="202" width="1088" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="56" y="226" class="lbl" font-size="16">主存 DRAM</text>

  <!-- Current LPDDR5X -->
  <rect x="56" y="236" width="200" height="48" rx="8" class="cur"/>
  <text x="72" y="254" font-size="12.5" font-weight="700" fill="#991b1b">LPDDR5X</text>
  <text x="72" y="272" class="sub" font-size="11.5">~34 GB/s · 单轨供电 · 无 ECC</text>

  <text x="266" y="262" font-size="16" fill="#0d9488">→</text>

  <!-- LPDDR6 -->
  <rect x="286" y="236" width="340" height="48" rx="8" class="evo"/>
  <text x="302" y="254" font-size="12.5" font-weight="700" fill="#14532d">LPDDR6（JEDEC 2025）</text>
  <text x="302" y="272" class="sub" font-size="11.5">14.4Gbps/pin · ~76.8 GB/s（2×）· 双轨供电 · PIM 接口</text>
  <circle cx="610" cy="250" r="13" class="badge"/><text x="610" y="255" class="bt" font-size="13">5</text>

  <!-- Current HBM3E -->
  <rect x="644" y="236" width="200" height="48" rx="8" class="cur"/>
  <text x="660" y="254" font-size="12.5" font-weight="700" fill="#991b1b">HBM3E</text>
  <text x="660" y="272" class="sub" font-size="11.5">1.2–1.33 TB/s · 12nm base die</text>

  <text x="854" y="262" font-size="16" fill="#0d9488">→</text>

  <!-- HBM4 -->
  <rect x="874" y="236" width="240" height="48" rx="8" class="evo"/>
  <text x="890" y="254" font-size="12.5" font-weight="700" fill="#14532d">HBM4（先进封装 · 3nm base）</text>
  <text x="890" y="272" class="sub" font-size="11.5">2–3.3 TB/s · 混合键合 · UCIe</text>
  <circle cx="1098" cy="250" r="13" class="badge"/><text x="1098" y="255" class="bt" font-size="13">7</text>

  <!-- ═══ Separator ═══ -->
  <line x1="180" y1="312" x2="180" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="640" y1="312" x2="640" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Level 3: eNVM 嵌入式非易失存储 ═══ -->
  <rect x="40" y="332" width="1088" height="104" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="56" y="356" class="lbl" font-size="16">嵌入式非易失存储（eNVM）</text>

  <!-- Current eFlash -->
  <rect x="56" y="366" width="240" height="48" rx="8" class="cur"/>
  <text x="72" y="384" font-size="12.5" font-weight="700" fill="#991b1b">现状：eFlash</text>
  <text x="72" y="400" class="sub" font-size="11.5">卡死 28nm · 7–13 额外掩膜 · +25% 成本</text>

  <text x="306" y="392" font-size="16" fill="#0d9488">→</text>

  <!-- ReRAM -->
  <rect x="326" y="366" width="280" height="48" rx="8" class="evo"/>
  <text x="342" y="384" font-size="12.5" font-weight="700" fill="#14532d">ReRAM / RRAM（可缩放至 12nm）</text>
  <text x="342" y="400" class="sub" font-size="11.5">仅 ~2 额外掩膜 · 支持模拟存算一体</text>
  <circle cx="590" cy="380" r="13" class="badge"/><text x="590" y="385" class="bt" font-size="13">3</text>

  <!-- STT-MRAM eNVM -->
  <rect x="620" y="366" width="280" height="48" rx="8" class="evo"/>
  <text x="636" y="384" font-size="12.5" font-weight="700" fill="#14532d">STT-MRAM eNVM（统一 NVM + 工作内存）</text>
  <text x="636" y="400" class="sub" font-size="11.5">BEOL 集成 · 22/16nm MCU 量产</text>
  <circle cx="884" cy="380" r="13" class="badge"/><text x="884" y="385" class="bt" font-size="13">2</text>

  <text x="916" y="424" class="sub" font-size="11.5">注：STT-MRAM ② 横跨 eNVM 与 LLC 两层——上层做缓存，本层做代码/数据非易失存储</text>

  <!-- ═══ Separator ═══ -->
  <line x1="400" y1="436" x2="400" y2="454" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Level 4: Flash 存储 ═══ -->
  <rect x="40" y="456" width="1088" height="90" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="56" y="480" class="lbl" font-size="16">Flash 存储（NAND）</text>

  <!-- Current UFS 4.0 -->
  <rect x="56" y="490" width="240" height="42" rx="8" class="cur"/>
  <text x="72" y="508" font-size="12.5" font-weight="700" fill="#991b1b">UFS 4.0（HS-G5）</text>
  <text x="72" y="522" class="sub" font-size="11.5">~4.2 GB/s · 7B 模型加载 ~1s · 无头余量</text>

  <text x="306" y="514" font-size="16" fill="#0d9488">→</text>

  <!-- UFS 5.0 -->
  <rect x="326" y="490" width="380" height="42" rx="8" class="evo"/>
  <text x="342" y="508" font-size="12.5" font-weight="700" fill="#14532d">UFS 5.0（HS-G6 · M-PHY 6.0）</text>
  <text x="342" y="522" class="sub" font-size="11.5">10.8 GB/s（2.6×）· 功效 +40% · inline hash 数据完整性</text>
  <circle cx="690" cy="504" r="13" class="badge"/><text x="690" y="509" class="bt" font-size="13">6</text>

  <!-- ═══ Separator ═══ -->
  <line x1="400" y1="546" x2="400" y2="564" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ═══ Level 5: 模拟存算一体 (Cross-cutting) ═══ -->
  <rect x="40" y="566" width="1088" height="90" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="56" y="590" class="lbl" font-size="16" fill="#581c87">模拟存算一体（Analog CIM · 横切神经网络加速器）</text>

  <!-- Current ReRAM/PCM CIM -->
  <rect x="56" y="600" width="280" height="42" rx="8" class="cur"/>
  <text x="72" y="618" font-size="12.5" font-weight="700" fill="#991b1b">ReRAM/PCM CIM 现状</text>
  <text x="72" y="632" class="sub" font-size="11.5">可靠模拟态仅 4–16 · 非对称性系数高达 70</text>

  <text x="346" y="624" font-size="16" fill="#0d9488">→</text>

  <!-- ECRAM + FeFET -->
  <rect x="366" y="600" width="430" height="42" rx="8" class="evo"/>
  <text x="382" y="618" font-size="12.5" font-weight="700" fill="#14532d">ECRAM（>1000 态 · 对称线性）+ HfO₂ FeFET（CMOS 原生 · sub-ns）</text>
  <text x="382" y="632" class="sub" font-size="11.5">突破 ReRAM 瓶颈 → 片上 DNN 训练 · 目标 >256 态</text>
  <circle cx="780" cy="614" r="13" class="badge"/><text x="780" y="619" class="bt" font-size="13">4</text>

  <!-- ═══ Legend ═══ -->
  <line x1="40" y1="672" x2="1240" y2="672" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="40" y="696" class="lbl" font-size="15">八个洞察（对应上图编号）</text>
  <g font-size="13">
    <circle cx="52" cy="722" r="12" class="badge"/><text x="52" y="727" class="bt">1</text>
    <text x="72" y="727" fill="#0f172a">SOT-MRAM：3 端 sub-ns 自旋器件，零漏电，替代 SRAM 做 L2/L3 缓存</text>
    <circle cx="52" cy="752" r="12" class="badge"/><text x="52" y="757" class="bt">2</text>
    <text x="72" y="757" fill="#0f172a">STT-MRAM：BEOL 嵌入式商用化，统一 LLC + eNVM（2.3× 密度 · 零待机漏电）</text>
    <circle cx="52" cy="782" r="12" class="badge"/><text x="52" y="787" class="bt">3</text>
    <text x="72" y="787" fill="#0f172a">ReRAM/RRAM：可缩放至 12nm 的 eNVM 替代，仅 ~2 额外掩膜（成本 −25%）</text>
    <circle cx="52" cy="812" r="12" class="badge"/><text x="52" y="817" class="bt">4</text>
    <text x="72" y="817" fill="#0f172a">ECRAM + FeFET：>1000 对称模拟态，突破 ReRAM 精度瓶颈实现片上训练</text>
    <circle cx="668" cy="722" r="12" class="badge"/><text x="668" y="727" class="bt">5</text>
    <text x="688" y="727" fill="#0f172a">LPDDR6：14.4Gbps/pin，带宽 2×，双轨供电省 22~27% 功耗，原生 PIM 接口</text>
    <circle cx="668" cy="752" r="12" class="badge"/><text x="668" y="757" class="bt">6</text>
    <text x="688" y="757" fill="#0f172a">UFS 5.0：HS-G6 10.8 GB/s（2.6×），为端侧 AI 模型加载和 KV 卸载倍增管道</text>
    <circle cx="668" cy="782" r="12" class="badge"/><text x="668" y="787" class="bt">7</text>
    <text x="688" y="787" fill="#0f172a">HBM4 + 先进封装：3nm base die + 混合键合 + UCIe，2–3.3 TB/s 带宽</text>
    <circle cx="668" cy="812" r="12" class="badge"/><text x="668" y="817" class="bt">8</text>
    <text x="688" y="817" fill="#0f172a">混合 SRAM-MRAM 缓存：L1 保留 SRAM、L2/LLC 换 MRAM，释放 20–30% 面积</text>
  </g>
  <text x="52" y="845" font-size="12" fill="#64748b">注：②横跨缓存与eNVM两层；①⑧围绕同一目标（SRAM替代）但成熟度不同；⑤⑥⑦为各自层级的「下一代标准」。④横切神经网络加速器。</text>
</svg>
